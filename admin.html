<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – AppDz Exchange</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4fa;min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:230px;background:#1a1f36;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;display:flex;flex-direction:column;}
.main{margin-left:230px;flex:1;min-height:100vh;}
.sidebar-logo{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-logo h1{color:#fff;font-size:15px;font-weight:800;letter-spacing:.2px;}
.sidebar-logo p{color:rgba(255,255,255,.4);font-size:11px;margin-top:2px;}
.nav-link{display:flex;align-items:center;gap:11px;padding:12px 20px;color:rgba(255,255,255,.55);cursor:pointer;font-size:13px;font-weight:600;border:none;background:none;width:100%;text-align:left;transition:.15s;border-right:3px solid transparent;}
.nav-link:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-link.active{background:rgba(79,140,255,.13);color:#6ea8fe;border-right-color:#6ea8fe;}
.nav-icon{font-size:17px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;}
.sidebar-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);margin-top:auto;}
.page-header{background:#fff;border-bottom:1px solid #e5eaf2;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.page-title{font-size:18px;font-weight:800;color:#1a1f36;}
.page-sub{font-size:11px;color:#aaa;margin-top:1px;}
.page-body{padding:22px 28px;}
.panel{display:none;}
.panel.active{display:block;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.05);border-left:4px solid #e0e8f5;cursor:pointer;transition:.15s;}
.stat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px);}
.stat-card.c-blue{border-color:#3b82f6;}.stat-card.c-orange{border-color:#f59e0b;}.stat-card.c-purple{border-color:#8b5cf6;}.stat-card.c-green{border-color:#10b981;}.stat-card.c-red{border-color:#ef4444;}
.stat-lbl{font-size:10px;font-weight:800;color:#aaa;letter-spacing:.5px;margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:900;color:#1a1f36;}
.stat-sub{font-size:11px;color:#bbb;margin-top:3px;}
.section-title{font-size:12px;font-weight:800;color:#555;letter-spacing:.5px;margin-bottom:12px;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.search-box{flex:1;min-width:180px;padding:9px 13px;border:1.5px solid #e0e8f5;border-radius:10px;font-size:13px;outline:none;background:#f8fafc;}
.search-box:focus{border-color:#1254a0;background:#fff;}
.fbtn{padding:7px 12px;border:1.5px solid #e0e8f5;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;color:#666;transition:.12s;white-space:nowrap;}
.fbtn.active{background:#1254a0;border-color:#1254a0;color:#fff;}
.tx-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 6px rgba(0,0,0,.05);display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:.15s;border-left:4px solid #e0e8f5;margin-bottom:8px;}
.tx-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);transform:translateY(-1px);}
.tx-card.st-en_attente{border-color:#f59e0b;}.tx-card.st-preuve_envoyee{border-color:#3b82f6;}.tx-card.st-validee{border-color:#8b5cf6;}.tx-card.st-terminee{border-color:#10b981;}.tx-card.st-rejetee{border-color:#ef4444;}.tx-card.st-annulee{border-color:#9ca3af;}.tx-card.st-manque_info{border-color:#f97316;}
.tx-info{flex:1;min-width:0;}
.tx-user{font-size:13px;font-weight:700;color:#1a1f36;}
.tx-email{font-size:11px;color:#aaa;}
.tx-amount{font-size:16px;font-weight:900;color:#1254a0;margin:3px 0;}
.tx-dzd{font-size:12px;color:#666;}
.tx-date{font-size:10px;color:#bbb;margin-top:3px;}
.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0;}
.tx-acts{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.abtn{padding:6px 10px;border-radius:7px;font-size:11px;font-weight:700;border:none;cursor:pointer;transition:.12s;white-space:nowrap;}
.abtn:active{transform:scale(.95);}
.a-view{background:#eff6ff;color:#1d4ed8;}.a-ok{background:#d1fae5;color:#065f46;}.a-rej{background:#fee2e2;color:#dc2626;}.a-info{background:#fff7ed;color:#c2410c;}.a-del{background:#f3f4f6;color:#6b7280;}.a-proof{background:#ede9fe;color:#5b21b6;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.b-en_attente{background:#fef3c7;color:#92400e;}.b-preuve_envoyee{background:#dbeafe;color:#1e40af;}.b-validee{background:#ede9fe;color:#5b21b6;}.b-terminee{background:#d1fae5;color:#065f46;}.b-rejetee{background:#fee2e2;color:#991b1b;}.b-annulee{background:#f3f4f6;color:#6b7280;}.b-manque_info{background:#fff7ed;color:#c2410c;}
.user-row{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 6px rgba(0,0,0,.05);display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;transition:.15s;}
.user-row:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);}
.u-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1254a0,#0097a7);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:800;flex-shrink:0;}
.u-info{flex:1;}
.u-name{font-size:13px;font-weight:700;color:#1a1f36;}
.u-email{font-size:11px;color:#aaa;}
.u-meta{font-size:11px;color:#666;margin-top:2px;}
.settings-block{background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 2px 8px rgba(0,0,0,.05);max-width:480px;margin-bottom:16px;}
.s-title{font-size:14px;font-weight:800;color:#1a1f36;margin-bottom:16px;}
.s-lbl{font-size:10px;font-weight:800;color:#888;letter-spacing:.4px;display:block;margin-bottom:4px;}
.s-input{width:100%;padding:10px 12px;border:1.5px solid #e0e8f5;border-radius:9px;font-size:14px;outline:none;margin-bottom:12px;}
.s-input:focus{border-color:#1254a0;}
.s-btn{width:100%;padding:12px;background:linear-gradient(135deg,#1254a0,#0097a7);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:flex-start;justify-content:flex-end;}
.drawer-overlay.open{display:flex;}
.drawer{background:#fff;width:460px;max-width:100vw;height:100vh;overflow-y:auto;padding:22px 24px;box-shadow:-6px 0 30px rgba(0,0,0,.15);}
.drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.drawer-title{font-size:16px;font-weight:800;color:#1a1f36;}
.d-close{background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1;}
.d-section{background:#f8fafc;border-radius:11px;padding:13px 15px;margin-bottom:14px;}
.d-section-title{font-size:10px;font-weight:800;color:#aaa;letter-spacing:.5px;margin-bottom:9px;}
.d-row{display:flex;justify-content:space-between;font-size:13px;color:#555;padding:3px 0;}
.d-row b{color:#1254a0;font-weight:700;}
.proof-thumb{width:90px;height:65px;object-fit:cover;border-radius:8px;border:2px solid #e0e8f5;cursor:pointer;transition:.15s;}
.proof-thumb:hover{transform:scale(1.06);border-color:#1254a0;}
.action-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.dbtn{padding:9px 14px;border-radius:9px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:.13s;}
.dbtn:active{transform:scale(.97);}
.d-green{background:#d1fae5;color:#065f46;}.d-blue{background:#dbeafe;color:#1e40af;}.d-orange{background:#fff7ed;color:#c2410c;}.d-red{background:#fee2e2;color:#dc2626;}.d-purple{background:#ede9fe;color:#5b21b6;}.d-gray{background:#f3f4f6;color:#374151;}.d-primary{background:linear-gradient(135deg,#1254a0,#0097a7);color:#fff;}
.stat-chg{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.sc-btn{padding:5px 9px;border-radius:7px;font-size:11px;font-weight:700;border:1.5px solid #e0e8f5;cursor:pointer;background:#fff;color:#555;transition:.12s;}
.sc-btn.cur{border-color:#1254a0;color:#1254a0;background:#eff6ff;}
.up-zone{border:2px dashed #c7d8f0;border-radius:11px;padding:16px;text-align:center;cursor:pointer;background:#f8fafc;margin-top:8px;}
.up-zone:hover{background:#eff6ff;border-color:#1254a0;}
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:700;display:none;align-items:center;justify-content:center;}
.img-viewer.open{display:flex;}
.img-viewer img{max-width:90vw;max-height:85vh;border-radius:10px;}
.iv-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.toast{position:fixed;bottom:22px;right:22px;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:700;color:#fff;z-index:800;display:none;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.toast.show{display:block;}
.toast.ok{background:#065f46;}.toast.err{background:#991b1b;}.toast.info{background:#1254a0;}
.empty{text-align:center;padding:44px 20px;color:#bbb;}
.empty-ico{font-size:44px;margin-bottom:10px;}
@media(max-width:768px){
  .sidebar{width:58px;}
  .nav-link span:not(.nav-icon){display:none;}
  .sidebar-logo h1,.sidebar-logo p{display:none;}
  .main{margin-left:58px;}
  .page-body{padding:14px;}
  .drawer{width:100vw;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .tx-card{flex-wrap:wrap;}
  .tx-acts{width:100%;}
}
</style>
</head>
<body>
<div class="layout">

<nav class="sidebar">
  <div class="sidebar-logo"><h1>AppDz Exchange</h1><p>Administration</p></div>
  <button class="nav-link active" id="navDash" onclick="show('Dash')"><span class="nav-icon">📊</span><span>Tableau de bord</span></button>
  <button class="nav-link" id="navTx" onclick="show('Tx')"><span class="nav-icon">🔄</span><span>Transferts</span><span id="pendingBadge" class="nav-badge" style="display:none;">0</span></button>
  <button class="nav-link" id="navUsers" onclick="show('Users')"><span class="nav-icon">👥</span><span>Utilisateurs</span></button>
  <button class="nav-link" id="navSettings" onclick="show('Settings')"><span class="nav-icon">⚙️</span><span>Paramètres</span></button>
  <div class="sidebar-footer">
    <button class="nav-link" onclick="confirmLogout()" style="color:rgba(255,255,255,.4);padding-left:0;"><span class="nav-icon">🚪</span><span>Déconnexion</span></button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div><div class="page-title" id="pgTitle">Tableau de bord</div><div class="page-sub" id="pgSub">Vue d'ensemble</div></div>
    <div style="font-size:12px;color:#aaa;" id="adminLbl"></div>
  </div>
  <div class="page-body">

    <!-- DASHBOARD -->
    <div id="panelDash" class="panel active">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="section-title">ACTIVITÉ RÉCENTE</div>
      <div id="recentList"></div>
    </div>

    <!-- TRANSFERTS -->
    <div id="panelTx" class="panel">
      <div class="toolbar">
        <input class="search-box" id="searchBox" placeholder="Nom, email, montant..." oninput="applyFilter()">
        <button class="fbtn active" id="f-tous" onclick="setF('tous')">Tous</button>
        <button class="fbtn" id="f-en_attente" onclick="setF('en_attente')">⏳ En attente</button>
        <button class="fbtn" id="f-preuve_envoyee" onclick="setF('preuve_envoyee')">📤 Preuve reçue</button>
        <button class="fbtn" id="f-validee" onclick="setF('validee')">✅ Validés</button>
        <button class="fbtn" id="f-terminee" onclick="setF('terminee')">🏁 Terminés</button>
        <button class="fbtn" id="f-rejetee" onclick="setF('rejetee')">❌ Rejetés</button>
        <button class="fbtn" id="f-annulee" onclick="setF('annulee')">🚫 Annulés</button>
      </div>
      <div id="txList"></div>
    </div>

    <!-- UTILISATEURS -->
    <div id="panelUsers" class="panel">
      <div class="toolbar">
        <input class="search-box" id="userSearch" placeholder="Rechercher un utilisateur..." oninput="renderUsers()">
      </div>
      <div id="usersList"></div>
    </div>

    <!-- PARAMETRES -->
    <div id="panelSettings" class="panel">
      <div class="settings-block">
        <div class="s-title">⚙️ Configuration</div>
        <label class="s-lbl">TAUX (DZD par 1 EUR)</label>
        <input class="s-input" id="sTaux" type="number" placeholder="275">
        <label class="s-lbl">NUMÉRO CCP ADMIN (BaridiMob)</label>
        <input class="s-input" id="sCCP" type="text" placeholder="00799999000...">
        <label class="s-lbl">EMAIL PAYSERA ADMIN</label>
        <input class="s-input" id="sPaysera" type="email" placeholder="admin@paysera.com">
        <button class="s-btn" onclick="saveSettings()">💾 Enregistrer</button>
        <div id="settingsMsg" style="margin-top:10px;font-size:13px;text-align:center;"></div>
      </div>
    </div>

  </div>
</div>
</div>

<!-- DRAWER DETAIL -->
<div id="drawer" class="drawer-overlay" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer">
    <div class="drawer-head">
      <span class="drawer-title" id="drawerTitle">Détail transfert</span>
      <button class="d-close" onclick="closeDrawer()">✕</button>
    </div>
    <div id="drawerBody"></div>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div id="imgViewer" class="img-viewer" onclick="this.classList.remove('open')">
  <button class="iv-close" onclick="document.getElementById('imgViewer').classList.remove('open')">✕</button>
  <img id="ivSrc" src="" alt="">
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- FILE INPUT -->
<input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleProofUpload(this)">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
var firebaseConfig={apiKey:"AIzaSyBFl6VxDko5kQb-Ww7HGJ7sPx26r2Ff9kA",authDomain:"appdzexchange.firebaseapp.com",projectId:"appdzexchange",storageBucket:"appdzexchange.firebasestorage.app",messagingSenderId:"217882852453",appId:"1:217882852483:android:b687e98a47d7f274d9efb6"};
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth(), db=firebase.firestore(), storage=firebase.storage();
var ADMIN="giftformenow@gmail.com";
var allTx=[], allUsers=[], curFilter='tous', curSearch='', curTxId=null;

auth.onAuthStateChanged(function(u){
  if(!u||u.email!==ADMIN){location.href='auth.html';return;}
  document.getElementById('adminLbl').textContent=u.email;
  initListeners();
});

function initListeners(){
  db.collection('transferts').onSnapshot(function(snap){
    allTx=snap.docs.map(function(d){
      var x=d.data();x.id=d.id;
      var ts=x.createdAt&&x.createdAt.toDate?x.createdAt.toDate().getTime():0;
      x._ts=ts;
      x.dateStr=ts?new Date(ts).toLocaleDateString('fr-DZ')+' '+new Date(ts).toLocaleTimeString('fr-DZ',{hour:'2-digit',minute:'2-digit'}):'';
      return x;
    });
    allTx.sort(function(a,b){return b._ts-a._ts;});
    renderDash();renderTxList();updateBadge();
    if(curTxId){var t=allTx.find(function(x){return x.id===curTxId;});if(t)fillDrawer(t);}
  },function(e){toast('Erreur chargement: '+e.message,'err');});

  db.collection('users').onSnapshot(function(snap){
    allUsers=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});
    renderUsers();
  });

  db.collection('config').doc('settings').get().then(function(s){
    if(s.exists){var d=s.data();
      document.getElementById('sTaux').value=d.taux||275;
      document.getElementById('sCCP').value=d.ccpAdmin||'';
      document.getElementById('sPaysera').value=d.payseraAdmin||'';
    }
  });
}

// ── DASHBOARD ──
function renderDash(){
  var c={en_attente:0,preuve_envoyee:0,validee:0,terminee:0,rejetee:0,annulee:0,manque_info:0};
  var totEur=0;
  allTx.forEach(function(t){if(c[t.statut]!==undefined)c[t.statut]++;if(t.statut==='terminee')totEur+=Number(t.montantEur)||0;});
  var cards=[
    {c:'c-orange',ico:'📤',lbl:'PREUVE REÇUE',val:c.preuve_envoyee,sub:'À valider maintenant',f:'preuve_envoyee'},
    {c:'c-blue',ico:'⏳',lbl:'EN ATTENTE',val:c.en_attente,sub:'Nouveaux transferts',f:'en_attente'},
    {c:'c-purple',ico:'✅',lbl:'VALIDÉS',val:c.validee,sub:'Preuve Paysera à envoyer',f:'validee'},
    {c:'c-green',ico:'🏁',lbl:'TERMINÉS',val:c.terminee,sub:totEur.toLocaleString('fr-DZ')+' EUR échangés',f:'terminee'},
    {c:'c-red',ico:'❌',lbl:'REJETÉS/ANNULÉS',val:c.rejetee+c.annulee,sub:'',f:'rejetee'},
  ];
  document.getElementById('statsGrid').innerHTML=cards.map(function(s){
    return '<div class="stat-card '+s.c+'" onclick="show(\'Tx\');setF(\''+s.f+'\')">'+
      '<div class="stat-lbl">'+s.lbl+'</div>'+
      '<div class="stat-val">'+s.ico+' '+s.val+'</div>'+
      '<div class="stat-sub">'+s.sub+'</div></div>';
  }).join('');
  var rec=allTx.slice(0,6);
  document.getElementById('recentList').innerHTML=rec.length?rec.map(function(t){
    return '<div class="tx-card st-'+t.statut+'" onclick="openDrawer(\''+t.id+'\')">'+
      '<div class="tx-info"><div class="tx-user">'+(t.nomUser||t.email||'—')+'</div>'+
      '<div class="tx-amount">'+t.montantEur+' EUR</div>'+
      '<div class="tx-date">'+t.dateStr+'</div></div>'+
      '<span class="badge b-'+t.statut+'">'+slbl(t.statut)+'</span></div>';
  }).join(''):'<div class="empty"><div class="empty-ico">📭</div><div>Aucune activité</div></div>';
}

// ── TX LIST ──
function setF(f){
  curFilter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('f-'+f).classList.add('active');
  renderTxList();
}
function applyFilter(){curSearch=document.getElementById('searchBox').value.toLowerCase();renderTxList();}

function renderTxList(){
  var list=document.getElementById('txList');if(!list)return;
  var filtered=allTx.filter(function(t){
    if(curFilter!=='tous'&&t.statut!==curFilter)return false;
    if(curSearch){var h=((t.nomUser||'')+(t.email||'')+(t.emailPaysera||'')+(t.montantEur||'')).toLowerCase();if(!h.includes(curSearch))return false;}
    return true;
  });
  if(!filtered.length){list.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><div>Aucun résultat</div></div>';return;}
  list.innerHTML=filtered.map(function(t){
    var acts='<button class="abtn a-view" onclick="event.stopPropagation();openDrawer(\''+t.id+'\')">👁 Voir</button>';
    if(t.statut==='preuve_envoyee'){
      acts+='<button class="abtn a-ok" onclick="event.stopPropagation();quickOk(\''+t.id+'\')">✓ Valider</button>';
      acts+='<button class="abtn a-rej" onclick="event.stopPropagation();quickRej(\''+t.id+'\')">✗ Rejeter</button>';
      acts+='<button class="abtn a-info" onclick="event.stopPropagation();quickInfo(\''+t.id+'\')">⚠ Info</button>';
    }else if(t.statut==='validee'){
      acts+='<button class="abtn a-proof" onclick="event.stopPropagation();startUpload(\''+t.id+'\')">📤 Preuve</button>';
    }
    acts+='<button class="abtn a-del" onclick="event.stopPropagation();delTx(\''+t.id+'\')">🗑</button>';
    return '<div class="tx-card st-'+t.statut+'" onclick="openDrawer(\''+t.id+'\')">'+
      '<div class="tx-info">'+
        '<div class="tx-user">'+(t.nomUser||'—')+'<span class="tx-email" style="margin-left:6px;">'+(t.email||'')+'</span></div>'+
        '<div class="tx-amount">'+t.montantEur+' EUR</div>'+
        '<div class="tx-dzd">'+(t.montantDzd?'→ '+Number(t.montantDzd).toLocaleString('fr-DZ')+' DZD':'')+'</div>'+
        '<div class="tx-date">'+t.dateStr+'</div>'+
      '</div>'+
      '<div class="tx-right">'+
        '<span class="badge b-'+t.statut+'">'+slbl(t.statut)+'</span>'+
        '<div class="tx-acts">'+acts+'</div>'+
      '</div></div>';
  }).join('');
}

function updateBadge(){
  var n=allTx.filter(function(t){return t.statut==='preuve_envoyee';}).length;
  var b=document.getElementById('pendingBadge');
  if(n>0){b.textContent=n;b.style.display='inline';}else b.style.display='none';
}

// ── DRAWER ──
function openDrawer(id){
  curTxId=id;
  var t=allTx.find(function(x){return x.id===id;});
  if(!t)return;
  fillDrawer(t);
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');curTxId=null;}

function fillDrawer(t){
  document.getElementById('drawerTitle').textContent=(t.nomUser||t.email||'Transfert')+' · '+t.montantEur+' EUR';
  var proofUser=t.preuveUserUrl?
    '<div class="d-section-title" style="margin-top:10px;">PREUVE UTILISATEUR</div>'+
    '<img src="'+t.preuveUserUrl+'" class="proof-thumb" onclick="viewImg(\''+t.preuveUserUrl+'\')" />':
    '<div style="font-size:12px;color:#bbb;margin-bottom:10px;">Aucune preuve utilisateur</div>';
  var proofAdmin=t.preuveAdminUrl?
    '<div class="d-section-title" style="margin-top:10px;">VOTRE PREUVE PAYSERA</div>'+
    '<img src="'+t.preuveAdminUrl+'" class="proof-thumb" onclick="viewImg(\''+t.preuveAdminUrl+'\')" />':'';
  
  var acts='';
  if(t.statut==='preuve_envoyee'){
    acts='<button class="dbtn d-green" onclick="chgSt(\''+t.id+'\',\'validee\')">✓ Valider la preuve</button>'+
      '<button class="dbtn d-orange" onclick="promptInfo(\''+t.id+'\')">⚠ Info manquante</button>'+
      '<button class="dbtn d-red" onclick="promptRej(\''+t.id+'\')">✗ Rejeter</button>';
  }else if(t.statut==='validee'){
    acts='<button class="dbtn d-purple" onclick="startUpload(\''+t.id+'\')">📤 Uploader preuve Paysera</button>';
  }else if(t.statut==='en_attente'){
    acts='<button class="dbtn d-gray" onclick="chgSt(\''+t.id+'\',\'annulee\')">Annuler ce transfert</button>';
  }else if(t.statut==='manque_info'){
    acts='<button class="dbtn d-green" onclick="chgSt(\''+t.id+'\',\'validee\')">Valider quand même</button>'+
      '<button class="dbtn d-red" onclick="promptRej(\''+t.id+'\')">Rejeter</button>';
  }else if(t.statut==='terminee'){
    acts='<button class="dbtn d-gray" style="opacity:.6;cursor:default;">✓ Transfert terminé</button>';
  }
  acts+='<button class="dbtn d-red" onclick="delTx(\''+t.id+'\')" style="margin-left:auto;">🗑 Supprimer</button>';

  var statBtns=['en_attente','preuve_envoyee','validee','terminee','rejetee','annulee','manque_info'].map(function(s){
    return '<button class="sc-btn'+(t.statut===s?' cur':'')+'" onclick="chgSt(\''+t.id+'\',\''+s+'\')">'+slbl(s)+'</button>';
  }).join('');

  document.getElementById('drawerBody').innerHTML=
    '<div class="d-section">'+
      '<div class="d-section-title">UTILISATEUR</div>'+
      '<div class="d-row"><span>Nom</span><b>'+(t.nomUser||'—')+'</b></div>'+
      '<div class="d-row"><span>Email</span><b>'+(t.email||'—')+'</b></div>'+
      '<div class="d-row"><span>Paysera</span><b>'+(t.emailPaysera||'—')+'</b></div>'+
      '<div class="d-row"><span>CCP</span><b>'+(t.ccpUser||'—')+'</b></div>'+
    '</div>'+
    '<div class="d-section">'+
      '<div class="d-section-title">MONTANTS</div>'+
      '<div class="d-row"><span>EUR demandé</span><b>'+t.montantEur+' EUR</b></div>'+
      '<div class="d-row"><span>DZD à envoyer</span><b>'+(t.montantDzd?Number(t.montantDzd).toLocaleString('fr-DZ')+' DZD':'—')+'</b></div>'+
      '<div class="d-row"><span>Taux</span><b>'+(t.taux||'—')+' DZD/EUR</b></div>'+
      '<div class="d-row"><span>Date</span><b>'+t.dateStr+'</b></div>'+
      '<div class="d-row"><span>Statut</span><span class="badge b-'+t.statut+'">'+slbl(t.statut)+'</span></div>'+
      (t.motifRejet?'<div class="d-row"><span>Motif rejet</span><b>'+t.motifRejet+'</b></div>':'')+
      (t.infoManquante?'<div class="d-row"><span>Info demandée</span><b>'+t.infoManquante+'</b></div>':'')+
    '</div>'+
    proofUser+proofAdmin+
    '<div class="action-row" style="margin-top:14px;">'+acts+'</div>'+
    '<div class="d-section" style="margin-top:4px;">'+
      '<div class="d-section-title">CHANGER LE STATUT</div>'+
      '<div class="stat-chg">'+statBtns+'</div>'+
    '</div>'+
    '<div id="drawerUpload" style="display:none;">'+
      '<div class="up-zone" onclick="document.getElementById(\'fileInput\').click()">'+
        '<div style="font-size:28px;">📷</div>'+
        '<div style="font-size:12px;color:#888;margin-top:6px;">Cliquer pour choisir la photo Paysera</div>'+
      '</div>'+
      '<div id="upProg" style="display:none;text-align:center;color:#1254a0;font-size:13px;margin-top:8px;">Upload en cours...</div>'+
    '</div>';
}

// ── ACTIONS ──
function quickOk(id){if(!confirm('Valider la preuve ?'))return;chgSt(id,'validee');}
function quickRej(id){var m=prompt('Motif (optionnel):');if(m===null)return;db.collection('transferts').doc(id).update({statut:'rejetee',motifRejet:m||'',updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){toast('Rejeté','ok');}).catch(function(e){toast(e.message,'err');});}
function quickInfo(id){var i=prompt('Information manquante :');if(!i)return;db.collection('transferts').doc(id).update({statut:'manque_info',infoManquante:i,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){toast('Info demandée','ok');}).catch(function(e){toast(e.message,'err');});}
function promptRej(id){var m=prompt('Motif du rejet (optionnel):');if(m===null)return;db.collection('transferts').doc(id).update({statut:'rejetee',motifRejet:m||'',updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){toast('Transfert rejeté','ok');closeDrawer();}).catch(function(e){toast(e.message,'err');});}
function promptInfo(id){var i=prompt('Quelle information est manquante ?');if(!i)return;db.collection('transferts').doc(id).update({statut:'manque_info',infoManquante:i,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){toast('Demande envoyée','ok');}).catch(function(e){toast(e.message,'err');});}
function chgSt(id,s){db.collection('transferts').doc(id).update({statut:s,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){toast('Statut → '+slbl(s),'ok');}).catch(function(e){toast(e.message,'err');});}
function delTx(id){if(!confirm('Supprimer définitivement ce transfert ?'))return;db.collection('transferts').doc(id).delete().then(function(){toast('Supprimé','ok');closeDrawer();curTxId=null;}).catch(function(e){toast(e.message,'err');});}

// ── UPLOAD ──
function startUpload(id){curTxId=id;var el=document.getElementById('drawerUpload');if(el)el.style.display='block';document.getElementById('fileInput').click();}
function handleProofUpload(input){
  var file=input.files[0];if(!file||!curTxId)return;
  var prog=document.getElementById('upProg');if(prog)prog.style.display='block';
  var ext=file.name.split('.').pop();
  storage.ref('preuves/'+curTxId+'/admin_'+Date.now()+'.'+ext).put(file)
    .then(function(s){return s.ref.getDownloadURL();})
    .then(function(url){return db.collection('transferts').doc(curTxId).update({preuveAdminUrl:url,statut:'terminee',updatedAt:firebase.firestore.FieldValue.serverTimestamp()});})
    .then(function(){if(prog)prog.style.display='none';toast('Preuve uploadée — Transfert terminé !','ok');closeDrawer();curTxId=null;})
    .catch(function(e){if(prog)prog.style.display='none';toast('Erreur upload: '+e.message,'err');});
  input.value='';
}

// ── USERS ──
function renderUsers(){
  var list=document.getElementById('usersList');if(!list)return;
  var q=(document.getElementById('userSearch')||{}).value||'';q=q.toLowerCase();
  var filtered=allUsers.filter(function(u){return !q||((u.nom||'')+(u.email||'')).toLowerCase().includes(q);});
  if(!filtered.length){list.innerHTML='<div class="empty"><div class="empty-ico">👤</div><div>Aucun utilisateur</div></div>';return;}
  list.innerHTML=filtered.map(function(u){
    var txN=allTx.filter(function(t){return t.userId===u.id;}).length;
    var init=(u.nom||u.email||'?').charAt(0).toUpperCase();
    var lastTx=allTx.filter(function(t){return t.userId===u.id;}).sort(function(a,b){return b._ts-a._ts;})[0];
    return '<div class="user-row" onclick="showUserTx(\''+u.id+'\')">'+
      '<div class="u-av">'+init+'</div>'+
      '<div class="u-info">'+
        '<div class="u-name">'+(u.nom||'—')+'</div>'+
        '<div class="u-email">'+(u.email||'—')+'</div>'+
        '<div class="u-meta">Paysera: '+(u.emailPaysera||'—')+' · CCP: '+(u.ccp||'—')+'</div>'+
        '<div class="u-meta">'+txN+' transfert(s)'+(lastTx?' · Dernier: '+lastTx.dateStr:'')+'</div>'+
      '</div>'+
      '<button class="abtn a-view" onclick="event.stopPropagation();showUserTx(\''+u.id+'\')">Voir transferts</button>'+
    '</div>';
  }).join('');
}

function showUserTx(uid){
  var u=allUsers.find(function(x){return x.id===uid;});
  show('Tx');
  document.getElementById('searchBox').value=(u&&u.email)||'';
  curSearch=(u&&u.email)||'';
  curFilter='tous';
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('f-tous').classList.add('active');
  document.getElementById('pgSub').textContent='Transferts de '+(u?u.nom||u.email:'');
  renderTxList();
}

// ── SETTINGS ──
function saveSettings(){
  var t=parseFloat(document.getElementById('sTaux').value);
  var c=document.getElementById('sCCP').value.trim();
  var p=document.getElementById('sPaysera').value.trim();
  if(!t){document.getElementById('settingsMsg').textContent='Taux invalide.';return;}
  db.collection('config').doc('settings').set({taux:t,ccpAdmin:c,payseraAdmin:p},{merge:true})
    .then(function(){document.getElementById('settingsMsg').textContent='✓ Enregistré';document.getElementById('settingsMsg').style.color='#059669';toast('Paramètres sauvegardés','ok');})
    .catch(function(e){document.getElementById('settingsMsg').textContent='Erreur: '+e.message;document.getElementById('settingsMsg').style.color='#dc2626';});
}

// ── NAV ──
var pTitles={Dash:['Tableau de bord','Vue d\'ensemble'],Tx:['Transferts','Gérer toutes les demandes'],Users:['Utilisateurs','Membres inscrits'],Settings:['Paramètres','Configuration générale']};
function show(n){
  ['Dash','Tx','Users','Settings'].forEach(function(x){document.getElementById('panel'+x).classList.remove('active');document.getElementById('nav'+x).classList.remove('active');});
  document.getElementById('panel'+n).classList.add('active');
  document.getElementById('nav'+n).classList.add('active');
  document.getElementById('pgTitle').textContent=pTitles[n][0];
  document.getElementById('pgSub').textContent=pTitles[n][1];
}

// ── HELPERS ──
function slbl(s){return{en_attente:'En attente',preuve_envoyee:'Preuve reçue',validee:'Validé',terminee:'Terminé',rejetee:'Rejeté',annulee:'Annulé',manque_info:'Info manquante'}[s]||s;}
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'info');setTimeout(function(){t.className='toast';},3000);}
function viewImg(url){document.getElementById('ivSrc').src=url;document.getElementById('imgViewer').classList.add('open');}
function confirmLogout(){if(confirm('Se déconnecter ?'))auth.signOut().then(function(){location.href='auth.html';});}
</script>
