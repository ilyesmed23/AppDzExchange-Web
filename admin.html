<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin - AppDz Exchange</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#f0f4fa; min-height:100vh; display:flex; flex-direction:column; }
.header { background:linear-gradient(135deg,#0f1923,#1254a0); color:#fff; padding:14px 16px; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,.3); }
.header-top { display:flex; align-items:center; justify-content:space-between; }
.header-logo { font-size:17px; font-weight:800; }
.admin-badge { background:#f59e0b; color:#fff; font-size:10px; font-weight:800; padding:3px 8px; border-radius:20px; margin-left:8px; }
.btn-logout { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; font-size:12px; font-weight:700; padding:6px 12px; border-radius:8px; cursor:pointer; }
.btn-logout:hover { background:rgba(255,0,0,.3); }
.stats-row { display:flex; gap:6px; margin-top:10px; overflow-x:auto; padding-bottom:4px; }
.stat-box { flex:0 0 auto; background:rgba(255,255,255,.12); border-radius:10px; padding:8px 12px; text-align:center; min-width:70px; }
.stat-num { font-size:20px; font-weight:800; }
.stat-label { font-size:9px; opacity:.75; margin-top:2px; }
.tabs { display:flex; background:#fff; border-bottom:2px solid #e5eaf2; position:sticky; top:90px; z-index:90; }
.tab { flex:1; padding:12px 4px; text-align:center; font-size:11px; font-weight:700; color:#aaa; cursor:pointer; border-bottom:3px solid transparent; transition:.15s; }
.tab.active { color:#1254a0; border-color:#1254a0; }
.content { flex:1; padding:12px; padding-bottom:30px; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.card { background:#fff; border-radius:14px; padding:14px; box-shadow:0 2px 10px rgba(0,0,0,.07); margin-bottom:12px; }
.section-title { font-size:13px; font-weight:800; color:#1254a0; margin-bottom:10px; }
/* Transfers */
.tx-item { background:#fff; border-radius:13px; padding:13px; box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:10px; border-left:4px solid #e0e8f5; cursor:pointer; transition:.15s; }
.tx-item:hover { box-shadow:0 4px 16px rgba(0,0,0,.12); }
.tx-item.st-en_attente { border-color:#f59e0b; }
.tx-item.st-preuve_envoyee { border-color:#3b82f6; }
.tx-item.st-validee { border-color:#10b981; }
.tx-item.st-terminee { border-color:#6b7280; }
.tx-item.st-rejetee { border-color:#ef4444; }
.tx-item.st-annulee { border-color:#9ca3af; }
.tx-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.tx-ref { font-size:11px; color:#999; font-weight:600; }
.tx-amount { font-size:16px; font-weight:800; color:#1254a0; }
.tx-user { font-size:12px; color:#555; margin-bottom:4px; }
.tx-date { font-size:10px; color:#aaa; }
.badge { display:inline-block; padding:3px 8px; border-radius:20px; font-size:10px; font-weight:800; }
.badge-en_attente { background:#fef3c7; color:#b45309; }
.badge-preuve_envoyee { background:#dbeafe; color:#1d4ed8; }
.badge-validee { background:#d1fae5; color:#065f46; }
.badge-terminee { background:#f3f4f6; color:#4b5563; }
.badge-rejetee { background:#fee2e2; color:#991b1b; }
.badge-annulee { background:#f3f4f6; color:#6b7280; }
.badge-manque_info { background:#fef3c7; color:#92400e; }
/* Filter */
.filter-row { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; }
.filter-btn { flex:0 0 auto; padding:5px 10px; border-radius:20px; border:1.5px solid #e0e8f5; font-size:11px; font-weight:700; color:#888; background:#fff; cursor:pointer; transition:.15s; }
.filter-btn.active { background:#1254a0; color:#fff; border-color:#1254a0; }
/* Detail modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); z-index:200; }
.modal-overlay.open { display:flex; align-items:flex-end; }
.modal-box { background:#fff; border-radius:22px 22px 0 0; padding:20px; width:100%; max-height:85vh; overflow-y:auto; }
.modal-title { font-size:16px; font-weight:800; color:#1254a0; margin-bottom:14px; }
.detail-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0f4fa; font-size:13px; }
.detail-label { color:#888; font-weight:600; }
.detail-val { color:#222; font-weight:700; max-width:60%; text-align:right; word-break:break-all; }
.action-btns { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
.btn { padding:10px 14px; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; transition:.15s; }
.btn:active { transform:scale(.97); }
.btn-primary { background:#1254a0; color:#fff; }
.btn-success { background:#10b981; color:#fff; }
.btn-danger { background:#ef4444; color:#fff; }
.btn-warning { background:#f59e0b; color:#fff; }
.btn-gray { background:#e5e7eb; color:#374151; }
.btn-close { background:#f3f4f6; color:#555; width:100%; margin-top:8px; }
.proof-img { width:100%; border-radius:10px; margin-top:10px; border:1px solid #e0e8f5; }
/* Users */
.user-item { background:#fff; border-radius:13px; padding:13px; box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:10px; display:flex; align-items:center; gap:12px; }
.user-avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#1254a0,#0097a7); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:800; flex-shrink:0; }
.user-info { flex:1; }
.user-name { font-size:14px; font-weight:700; color:#222; }
.user-email { font-size:11px; color:#888; margin-top:2px; }
.user-ccp { font-size:10px; color:#aaa; margin-top:2px; }
.user-blocked { color:#ef4444; font-size:10px; font-weight:700; margin-top:2px; }
.user-actions { display:flex; flex-direction:column; gap:6px; }
/* Settings */
.field { margin-bottom:14px; }
.field label { font-size:11px; color:#666; font-weight:700; display:block; margin-bottom:5px; letter-spacing:.4px; }
.field input { width:100%; padding:12px 13px; border:1.5px solid #e0e8f5; border-radius:11px; font-size:14px; color:#333; outline:none; background:#f8fafc; }
.field input:focus { border-color:#1254a0; background:#fff; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:10px 20px; border-radius:12px; font-size:13px; font-weight:600; z-index:999; display:none; }
.empty-msg { text-align:center; color:#aaa; font-size:13px; padding:30px 0; }
.search-input { width:100%; padding:10px 13px; border:1.5px solid #e0e8f5; border-radius:11px; font-size:13px; outline:none; background:#f8fafc; margin-bottom:10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <span class="header-logo">AppDz Exchange</span>
      <span class="admin-badge">ADMIN</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Deconnexion</button>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Transferts</div></div>
    <div class="stat-box"><div class="stat-num" id="statAttente">-</div><div class="stat-label">En attente</div></div>
    <div class="stat-box"><div class="stat-num" id="statPreuve">-</div><div class="stat-label">Preuves</div></div>
    <div class="stat-box"><div class="stat-num" id="statUsers">-</div><div class="stat-label">Utilisateurs</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('transferts')">Transferts</div>
  <div class="tab" onclick="showTab('utilisateurs')">Utilisateurs</div>
  <div class="tab" onclick="showTab('parametres')">Parametres</div>
</div>

<div class="content">
  <!-- TRANSFERTS -->
  <div id="tab-transferts" class="tab-panel active">
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterTx('tous')">Tous</button>
      <button class="filter-btn" onclick="filterTx('en_attente')">En attente</button>
      <button class="filter-btn" onclick="filterTx('preuve_envoyee')">Preuves</button>
      <button class="filter-btn" onclick="filterTx('validee')">Validees</button>
      <button class="filter-btn" onclick="filterTx('terminee')">Terminees</button>
      <button class="filter-btn" onclick="filterTx('rejetee')">Rejetees</button>
    </div>
    <div id="txList"><div class="empty-msg">Chargement...</div></div>
  </div>

  <!-- UTILISATEURS -->
  <div id="tab-utilisateurs" class="tab-panel">
    <input class="search-input" type="text" id="userSearch" placeholder="Rechercher un utilisateur..." oninput="renderUsers()">
    <div id="userList"><div class="empty-msg">Chargement...</div></div>
  </div>

  <!-- PARAMETRES -->
  <div id="tab-parametres" class="tab-panel">
    <div class="card">
      <div class="section-title">Taux de change</div>
      <div class="field">
        <label>1 EUR = ? DZD</label>
        <input type="number" id="tauxInput" placeholder="Ex: 245" min="1">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="saveTaux()">Enregistrer le taux</button>
    </div>
    <div class="card">
      <div class="section-title">Mon CCP (BaridiMob)</div>
      <div class="field">
        <label>Numero CCP complet</label>
        <input type="text" id="ccpInput" placeholder="00799999000XXXXXXXXX">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="saveCCP()">Enregistrer le CCP</button>
    </div>
    <div class="card">
      <div class="section-title">Compte Paysera admin</div>
      <div class="field">
        <label>Email Paysera pour recevoir les EUR</label>
        <input type="email" id="payseraInput" placeholder="admin@paysera.com">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="savePaysera()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL DETAIL TRANSFERT -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal-box" id="detailBox">
    <div class="modal-title" id="detailTitle">Detail du transfert</div>
    <div id="detailContent"></div>
    <div class="action-btns" id="detailActions"></div>
    <button class="btn btn-close" onclick="closeModalDirect()">Fermer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBFl6VxDko5kQb-Ww7HGJ7sPx26r2Ff9kA",
  authDomain: "appdzexchange.firebaseapp.com",
  projectId: "appdzexchange",
  storageBucket: "appdzexchange.firebasestorage.app",
  messagingSenderId: "217882852483",
  appId: "1:217882852483:android:b687e98a47d7f274d9efb6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();
const ADMIN_EMAIL = "giftformenow@gmail.com";

var allTx = [];
var allUsers = [];
var currentFilter = 'tous';
var currentTxId = null;

// Auth guard
auth.onAuthStateChanged(function(user) {
  if (!user || user.email !== ADMIN_EMAIL) {
    window.location.href = 'auth.html';
    return;
  }
  loadAll();
});

function loadAll() {
  loadTransferts();
  loadUsers();
  loadSettings();
}

// ===== TRANSFERTS =====
function loadTransferts() {
  db.collection('transferts').orderBy('createdAt', 'desc').onSnapshot(function(snap) {
    allTx = [];
    snap.forEach(function(doc) { allTx.push({ id: doc.id, ...doc.data() }); });
    updateStats();
    renderTx();
  }, function(err) { console.error('TX ERROR:', err); });
}

function updateStats() {
  document.getElementById('statTotal').textContent = allTx.length;
  document.getElementById('statAttente').textContent = allTx.filter(function(t){ return t.statut === 'en_attente'; }).length;
  document.getElementById('statPreuve').textContent = allTx.filter(function(t){ return t.statut === 'preuve_envoyee'; }).length;
  document.getElementById('statUsers').textContent = allUsers.length;
}

function filterTx(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');
  renderTx();
}

function renderTx() {
  var list = currentFilter === 'tous' ? allTx : allTx.filter(function(t){ return t.statut === currentFilter; });
  var el = document.getElementById('txList');
  if (!list.length) { el.innerHTML = '<div class="empty-msg">Aucun transfert</div>'; return; }
  el.innerHTML = list.map(function(tx) {
    var d = tx.createdAt ? new Date(tx.createdAt.seconds * 1000).toLocaleDateString('fr-FR') : '-';
    return '<div class="tx-item st-' + (tx.statut||'') + '" onclick="openDetail(\'' + tx.id + '\')">' +
      '<div class="tx-row">' +
        '<span class="tx-ref">#' + tx.id.substring(0,8).toUpperCase() + '</span>' +
        '<span class="badge badge-' + (tx.statut||'') + '">' + labelStatut(tx.statut) + '</span>' +
      '</div>' +
      '<div class="tx-amount">' + (tx.montantEUR||0) + ' EUR &rarr; ' + (tx.montantDZD||0) + ' DZD</div>' +
      '<div class="tx-user">' + (tx.userNom||tx.userEmail||'Utilisateur') + '</div>' +
      '<div class="tx-date">' + d + '</div>' +
    '</div>';
  }).join('');
}

function labelStatut(s) {
  var labels = { en_attente:'En attente', preuve_envoyee:'Preuve envoyee', validee:'Validee', terminee:'Terminee', rejetee:'Rejetee', annulee:'Annulee', manque_info:'Info manquante' };
  return labels[s] || s || '-';
}

function openDetail(id) {
  var tx = allTx.find(function(t){ return t.id === id; });
  if (!tx) return;
  currentTxId = id;
  var d = tx.createdAt ? new Date(tx.createdAt.seconds * 1000).toLocaleString('fr-FR') : '-';
  var rows = [
    ['Reference', '#' + id.substring(0,8).toUpperCase()],
    ['Statut', labelStatut(tx.statut)],
    ['Montant EUR', (tx.montantEUR||0) + ' EUR'],
    ['Montant DZD', (tx.montantDZD||0) + ' DZD'],
    ['Taux utilise', (tx.taux||'-') + ' DZD/EUR'],
    ['Utilisateur', tx.userNom || '-'],
    ['Email', tx.userEmail || '-'],
    ['Email Paysera', tx.emailPayseraUser || '-'],
    ['CCP utilisateur', tx.ccpUser || '-'],
    ['Date', d],
    ['Paysera admin', tx.payseraAdmin || '-'],
    ['CCP admin', tx.ccpAdmin || '-'],
  ];
  document.getElementById('detailTitle').textContent = 'Transfert ' + (tx.montantEUR||0) + ' EUR';
  document.getElementById('detailContent').innerHTML =
    rows.map(function(r){ return '<div class="detail-row"><span class="detail-label">' + r[0] + '</span><span class="detail-val">' + r[1] + '</span></div>'; }).join('') +
    (tx.preuveURL ? '<img class="proof-img" src="' + tx.preuveURL + '" onclick="window.open(\'' + tx.preuveURL + '\')"><br><small style="color:#888;font-size:10px">Cliquer pour agrandir</small>' : '') +
    (tx.noteAdmin ? '<div style="margin-top:10px;background:#fef3c7;padding:10px;border-radius:8px;font-size:12px"><b>Note admin:</b> ' + tx.noteAdmin + '</div>' : '');

  var actions = '';
  if (tx.statut === 'preuve_envoyee' || tx.statut === 'en_attente') {
    actions += '<button class="btn btn-success" onclick="actionStatut(\'' + id + '\',\'validee\')">Valider</button>';
    actions += '<button class="btn btn-warning" onclick="actionStatut(\'' + id + '\',\'manque_info\')">Info manquante</button>';
    actions += '<button class="btn btn-danger" onclick="actionStatut(\'' + id + '\',\'rejetee\')">Rejeter</button>';
  }
  if (tx.statut === 'validee') {
    actions += '<button class="btn btn-success" onclick="actionStatut(\'' + id + '\',\'terminee\')">Marquer termine</button>';
  }
  document.getElementById('detailActions').innerHTML = actions;
  document.getElementById('detailModal').classList.add('open');
}

function actionStatut(id, statut) {
  var note = '';
  if (statut === 'rejetee' || statut === 'manque_info') {
    note = prompt('Raison (optionnel):') || '';
  }
  var update = { statut: statut, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  if (note) update.noteAdmin = note;
  db.collection('transferts').doc(id).update(update).then(function() {
    showToast('Statut mis a jour !');
    closeModalDirect();
  }).catch(function(e){ showToast('Erreur: ' + e.message); });
}

function closeModal(e) {
  if (e.target === document.getElementById('detailModal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('detailModal').classList.remove('open');
}

// ===== UTILISATEURS =====
function loadUsers() {
  db.collection('users').onSnapshot(function(snap) {
    allUsers = [];
    snap.forEach(function(doc) { allUsers.push({ id: doc.id, ...doc.data() }); });
    updateStats();
    renderUsers();
  });
}

function renderUsers() {
  var q = (document.getElementById('userSearch').value || '').toLowerCase();
  var list = q ? allUsers.filter(function(u){ return (u.nom||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q); }) : allUsers;
  var el = document.getElementById('userList');
  if (!list.length) { el.innerHTML = '<div class="empty-msg">Aucun utilisateur</div>'; return; }
  el.innerHTML = list.map(function(u) {
    var init = (u.nom||'?')[0].toUpperCase();
    var blocked = u.blocked ? '<div class="user-blocked">BLOQUE</div>' : '';
    var btnLabel = u.blocked ? 'Debloquer' : 'Bloquer';
    var btnClass = u.blocked ? 'btn-success' : 'btn-danger';
    return '<div class="user-item">' +
      '<div class="user-avatar">' + init + '</div>' +
      '<div class="user-info">' +
        '<div class="user-name">' + (u.nom||'-') + '</div>' +
        '<div class="user-email">' + (u.email||'-') + '</div>' +
        '<div class="user-ccp">' + (u.ccp||'Pas de CCP') + '</div>' +
        blocked +
      '</div>' +
      '<div class="user-actions"><button class="btn ' + btnClass + '" style="font-size:11px;padding:6px 10px" onclick="toggleBlock(\'' + u.id + '\',' + (u.blocked?'true':'false') + ')">' + btnLabel + '</button></div>' +
    '</div>';
  }).join('');
}

function toggleBlock(uid, currentBlocked) {
  var newVal = !currentBlocked;
  db.collection('users').doc(uid).update({ blocked: newVal }).then(function() {
    showToast(newVal ? 'Utilisateur bloque' : 'Utilisateur debloque');
  });
}

// ===== PARAMETRES =====
function loadSettings() {
  db.collection('config').doc('settings').get().then(function(doc) {
    if (doc.exists) {
      var d = doc.data();
      if (d.taux) document.getElementById('tauxInput').value = d.taux;
      if (d.ccpAdmin) document.getElementById('ccpInput').value = d.ccpAdmin;
      if (d.payseraAdmin) document.getElementById('payseraInput').value = d.payseraAdmin;
    }
  });
}

function saveTaux() {
  var v = parseFloat(document.getElementById('tauxInput').value);
  if (!v || v <= 0) { showToast('Taux invalide'); return; }
  db.collection('config').doc('settings').set({ taux: v }, { merge: true }).then(function() { showToast('Taux enregistre !'); });
}

function saveCCP() {
  var v = document.getElementById('ccpInput').value.trim();
  if (!v) { showToast('CCP invalide'); return; }
  db.collection('config').doc('settings').set({ ccpAdmin: v }, { merge: true }).then(function() { showToast('CCP enregistre !'); });
}

function savePaysera() {
  var v = document.getElementById('payseraInput').value.trim();
  if (!v) { showToast('Email invalide'); return; }
  db.collection('config').doc('settings').set({ payseraAdmin: v }, { merge: true }).then(function() { showToast('Paysera enregistre !'); });
}

// ===== UI =====
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  var tabs = ['transferts','utilisateurs','parametres'];
  var idx = tabs.indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 3000);
}

function doLogout() {
  if (!confirm('Se deconnecter ?')) return;
  auth.signOut().then(function() { window.location.href = 'auth.html'; });
}
</script>
</body>
</html>
